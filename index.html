<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Formulário Senac</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header>
		<section>
			<h1>Formulário simples de um curso no Senac PR</h1>
			<p>Construindo formulário com estruturação semântica e estilização</p>
		</section>		
	</header>
<main>
	<div class="titulo-form">
	<h1>Formulário Senac PR</h1>
	
</div>
	<div class="formulario">
	<form>
		<h2>Insira seus dados pessoais</h2>
		<label for="name">Nome</label>
		<input type="name" name="name" id="name">
		<button>Enviar</button>
		<label for="email">Email</label>
		<input type="email" name="email" id="email">
		<button>Enviar</button>
		<label for="telefone">Telefone</label>
		<input type="tel" name="telefone" id="telefone">
		<button>Enviar</button>
	</form>
	</div>
	<div class="loading-container">
		<div class="loading"></div>
		<div class="loading"></div>
		<div class="loading"></div>
		<div class="loading"></div>
		</div>
</main>
<footer>
	
	<p>&copy; 2026 Formulário Senac PR - Todos os direitos reservados.</p>
	
</footer>
</body>
</html>
